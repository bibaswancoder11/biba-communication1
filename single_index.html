    function generateLocalDrafts(fullName, preferredContact, phone, email, selectedServiceNames, message) {
      const timestamp = new Date().toLocaleTimeString();
      const logs = [
        `[${timestamp}] Queue Console online.`,
        `[${timestamp}] Formulating professional client profile context...`
      ];

      const servicesText = selectedServiceNames.length > 0 ? selectedServiceNames.join(', ') : 'General Financial Consultation';
      logs.push(`[${new Date().toLocaleTimeString()}] Target Services: "${servicesText}"`);

      const subject = `Callback consultation request with Biba Communication - ${fullName}`;
      
      let advisoryLine = 'We have assigned a dedicated compliance officer to inspect your files.';
      const sLower = servicesText.toLowerCase();
      if (sLower.includes('tax') || sLower.includes('gst')) {
        advisoryLine = 'Our senior tax accountant is auditing GSTR-2B credit files to protect your margins.';
      } else if (sLower.includes('khajna') || sLower.includes('land')) {
        advisoryLine = 'Our land revenue desk is preparing database searches on West Bengal land registers.';
      }

      const emailBody = `Dear ${fullName},\n\nThank you for choosing Biba Communication. We have successfully received your callback request.\n\nSummary of Selected Services:\n\u2022 ${servicesText}\n\nOur Advisory Focus:\n${advisoryLine}\n\nWe will be in touch shortly via ${preferredContact === 'phone' ? `phone at ${phone}` : `email at ${email}`}.\n\nBest regards,\nBiba Communication Desk\nKolkata, West Bengal\nSupport: +91 7980224837`;
      const smsText = `Biba Callback Request: ${fullName} (${phone || 'N/A'}). Services: ${servicesText}.`;

      logs.push(`[${new Date().toLocaleTimeString()}] Local drafts generated successfully!`);
      logs.push(`[${new Date().toLocaleTimeString()}] WhatsApp & Email quick launches synchronized.`);

      return { subject, emailBody, smsText, logs };
    }

        const docsSet = new Set();

      }, [selectedServices]);

      const bundles = [
        { name: "Startup Launch Essentials", desc: "Acquire trade licenses, fresh PAN, and initiate monthly accounting logs.", services: ['trade-licence', 'pan-card', 'accounting-services'], badge: "Popular" },

      ];

      const complexityLevel = useMemo(() => {
        if (selectedServices.length === 0) return 'None';

          if (match) {

                            <span>{doc}</span>
                          </li>
                        ))}
                      </ul>

                  <div className="pt-2">
                    <button
                      disabled={selectedServices.length === 0}

    // --- CONTACT FORM & REAL-TIME CALLBACK QUEUE CONSOLE ---
    function ContactForm({ selectedServiceIds, onToggleService }) {
      const [fullName, setFullName] = useState('');
      const [email, setEmail] = useState('');
      const [phone, setPhone] = useState('');
      const [preferredContact, setPreferredContact] = useState('phone');
      const [message, setMessage] = useState('');
      
      const [inquiries, setInquiries] = useState([]);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');
      const [expandedInquiryId, setExpandedInquiryId] = useState(null);
      const [copiedText, setCopiedText] = useState({});

      useEffect(() => {
        const stored = localStorage.getItem('biba_inquiries');
        if (stored) {
          try { setInquiries(JSON.parse(stored)); } catch (e) { console.error(e); }
        }
      }, []);

      const handleCopy = (text, key) => {
        navigator.clipboard.writeText(text);
        setCopiedText(prev => ({ ...prev, [key]: true }));
        setTimeout(() => setCopiedText(prev => ({ ...prev, [key]: false })), 2000);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setErrorMessage('');
        setIsSubmitted(false);

        if (!fullName.trim()) return setErrorMessage('Full name is required.');
        if (!phone.trim() && preferredContact === 'phone') return setErrorMessage('Phone is required.');
        if (!email.trim() && preferredContact === 'email') return setErrorMessage('Email is required.');

        setIsSubmitting(true);

        setTimeout(() => {
          const selectedServiceNames = SERVICES_DATA
            .filter(s => selectedServiceIds.includes(s.id))
            .map(s => s.name);

          const localDrafts = generateLocalDrafts(fullName, preferredContact, phone, email, selectedServiceNames, message);

          const newInquiry = {
            id: 'inq-' + Date.now(),
            fullName,
            email,
            phone,
            preferredContact,
            selectedServiceIds: [...selectedServiceIds],
            message,
            submittedAt: new Date().toLocaleString(),
            status: 'Contacted',
            serverLogs: localDrafts.logs,
            aiEmailSubject: localDrafts.subject,
            aiEmailBody: localDrafts.emailBody,
            aiSms: localDrafts.smsText,
            statusMessage: 'Client Queue (Free Offline)',
            engineType: 'static'
          };

          const updated = [newInquiry, ...inquiries];
          setInquiries(updated);
          localStorage.setItem('biba_inquiries', JSON.stringify(updated));

          setExpandedInquiryId(newInquiry.id);
          setFullName('');
          setEmail('');
          setPhone('');
          setMessage('');
          setIsSubmitted(true);
          setIsSubmitting(false);

          setTimeout(() => setIsSubmitted(false), 8000);
        }, 800);
      };

      const handleDeleteInquiry = (id) => {
        const filtered = inquiries.filter(i => i.id !== id);
        setInquiries(filtered);
        localStorage.setItem('biba_inquiries', JSON.stringify(filtered));
        if (expandedInquiryId === id) setExpandedInquiryId(null);
      };

      return (
        <section id="contact" className="py-20 bg-white px-4 lg:px-8 border-b border-slate-100">
          <div className="max-w-7xl mx-auto space-y-12">
            
            <div className="text-center max-w-3xl mx-auto space-y-4">
              <span className="text-xs font-bold uppercase tracking-widest text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">Inquiry Desk</span>
              <h2 className="text-3xl sm:text-4xl font-serif font-bold text-slate-900 tracking-tight">Consultation Request {"&"} Callback</h2>
              <p className="text-slate-500 text-sm">Submit your ledger profile. Our static-queue client engine drafts immediate consultation files and lets you link instantly over WhatsApp.</p>
            </div>

            <div className="grid lg:grid-cols-12 gap-12 lg:gap-8 items-start">
              <div className="lg:col-span-5">
                <div className="bg-slate-900 text-white rounded-2xl p-6 sm:p-8 space-y-8 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full blur-2xl" />
                  <div className="space-y-3">
                    <h3 className="font-serif font-bold text-xl text-emerald-400">BIBA Communication</h3>
                    <p className="text-slate-300 text-xs sm:text-sm leading-relaxed">{"“"}{COMPANY_INFO.slogans[0]}{"”"}</p>
                  </div>

                  <div className="space-y-4 text-xs sm:text-sm">
                    <div className="flex items-start gap-4">
                      <div className="p-2.5 bg-slate-800 rounded-lg text-emerald-400 shrink-0"><Phone className="w-5 h-5" /></div>
                      <div>
                        <span className="block text-slate-400 text-xs font-semibold uppercase tracking-wider">Direct Hotlines</span>
                        {COMPANY_INFO.contacts.phones.map((phone, idx) => (
                          <a key={idx} href={`tel:${phone.replace(/\s+/g, '')}`} className="font-bold hover:text-emerald-400 transition-colors block mt-1">{phone}</a>
                        ))}
                      </div>
                    </div>

                    <div className="flex items-start gap-4">
                      <div className="p-2.5 bg-slate-800 rounded-lg text-emerald-400 shrink-0"><Mail className="w-5 h-5" /></div>
                      <div>
                        <span className="block text-slate-400 text-xs font-semibold uppercase tracking-wider">Email Inquiry</span>

                      </div>
                    </div>

                      <div className="p-2.5 bg-slate-800 rounded-lg text-emerald-400 shrink-0"><MapPin className="w-5 h-5" /></div>

                    )}

                    {isSubmitted && (
                      <div className="bg-emerald-50 text-emerald-850 p-4 rounded-xl border border-emerald-100 text-xs font-semibold space-y-1">
                        <p className="font-bold">Inquiry queued successfully into local console memory!</p>
                        <p className="text-slate-600 font-normal">Scroll down to view local logs, trigger immediate WhatsApp notifications, or launch structured mail client scripts.</p>
                      </div>
                    )}

                    <div className="grid sm:grid-cols-2 gap-5">
                      <div className="space-y-1.5">
                        <label className="text-xs font-bold text-slate-700 uppercase tracking-wider">Full Name</label>
                        <input type="text" required disabled={isSubmitting} placeholder="Rajat Ghosh" value={fullName} onChange={e => setFullName(e.target.value)} className="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm text-slate-800 focus:ring-2 focus:ring-emerald-500/20 focus:outline-none focus:border-emerald-500 transition-all font-medium" />
                      </div>

                      <div className="space-y-1.5">
                        <label className="text-xs font-bold text-slate-700 uppercase tracking-wider">Preferred Channel</label>
                        <div className="grid grid-cols-2 gap-2">
                          <button type="button" onClick={() => setPreferredContact('phone')} className={`py-2 rounded-lg text-xs font-bold border transition-all ${preferredContact === 'phone' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600 border-slate-200'}`}>Phone Call</button>
                          <button type="button" onClick={() => setPreferredContact('email')} className={`py-2 rounded-lg text-xs font-bold border transition-all ${preferredContact === 'email' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600 border-slate-200'}`}>Email Consultation</button>
                        </div>
                      </div>
                    </div>

                    <div className="grid sm:grid-cols-2 gap-5">
                      <div className="space-y-1.5">
                        <label className="text-xs font-bold text-slate-700 uppercase tracking-wider">Contact Phone</label>
                        <input type="tel" required={preferredContact === 'phone'} placeholder="+91 XXXXX XXXXX" value={phone} onChange={e => setPhone(e.target.value)} className="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm text-slate-800 focus:ring-2 focus:ring-emerald-500/20 focus:outline-none focus:border-emerald-500 transition-all font-medium" />
                      </div>

                      <div className="space-y-1.5">
                        <label className="text-xs font-bold text-slate-700 uppercase tracking-wider">Email Address</label>
                        <input type="email" required={preferredContact === 'email'} placeholder="name@example.com" value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm text-slate-800 focus:ring-2 focus:ring-emerald-500/20 focus:outline-none focus:border-emerald-500 transition-all font-medium" />
                      </div>
                    </div>

                    <div className="space-y-1.5">
                      <label className="text-xs font-bold text-slate-700 uppercase tracking-wider block">Selected Services ({selectedServiceIds.length})</label>
                      {selectedServiceIds.length > 0 ? (
                        <div className="flex flex-wrap gap-1.5 bg-white p-3 rounded-xl border border-slate-200">
                          {SERVICES_DATA.filter(s => selectedServiceIds.includes(s.id)).map(s => (
                            <span key={s.id} className="inline-flex items-center gap-1 bg-slate-100 text-slate-800 text-[11px] font-bold py-1 px-2.5 rounded-md border border-slate-200">
                              <span>{s.name}</span>
                              <button type="button" onClick={() => onToggleService(s.id)} className="text-slate-400 hover:text-red-500 font-bold ml-1 cursor-pointer">&times;</button>
                            </span>
                          ))}
                        </div>
                      ) : (
                        <div className="bg-amber-50 text-amber-800 text-xs p-3 rounded-xl border border-amber-100">
                          No services selected. Form will submit as standard consultation inquiry. Select above to plan.
                        </div>
                      )}
                    </div>

                    <div className="space-y-1.5">
                      <label className="text-xs font-bold text-slate-700 uppercase tracking-wider">Message Details</label>
                      <textarea rows={4} placeholder="Describe turnover scale, tax notices, land registry khatian, or key targets..." value={message} onChange={e => setMessage(e.target.value)} className="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm text-slate-800 focus:ring-2 focus:ring-emerald-500/20 focus:outline-none focus:border-emerald-500 transition-all font-medium" />
                    </div>

                    <button type="submit" disabled={isSubmitting} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-xl text-xs tracking-wider uppercase transition-all flex items-center justify-center gap-2 cursor-pointer">
                      {isSubmitting ? <><Loader2 className="w-4 h-4 animate-spin" /><span>Syncing Queue Memory...</span></> : <><LucideIcon name="Send" className="w-4 h-4" /><span>Join Callback Queue</span></>}
                    </button>
                  </form>
                </div>
              </div>
            </div>

            {inquiries.length > 0 && (
              <div className="bg-slate-50 rounded-2xl p-6 border border-slate-200 shadow-xs space-y-4">
                <div className="space-y-1">
                  <h3 className="font-serif font-bold text-slate-800 text-base flex items-center gap-2">
                    <Sparkles className="w-5 h-5 text-emerald-600 animate-pulse" />
                    <span>Real-Time Callback Queue Console ({inquiries.length})</span>
                  </h3>
                  <p className="text-xs text-slate-500">View static memory queue files, local compliance log sequences, and pre-written client responses below.</p>
                </div>

                <div className="space-y-4 max-h-[600px] overflow-y-auto pr-1">
                  {inquiries.map(inq => {
                    const isExpanded = expandedInquiryId === inq.id;
                    return (
                      <div key={inq.id} className="bg-white rounded-xl p-5 border border-slate-200 shadow-xs space-y-4 relative">
                        <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-3 pb-3 border-b border-slate-100">
                          <div>
                            <span className="text-[10px] font-bold text-slate-400 block">{inq.submittedAt}</span>
                            <h4 className="font-serif font-bold text-slate-800 text-base leading-tight">{inq.fullName}</h4>
                            <div className="flex flex-wrap gap-1.5 mt-1">
                              <span className="text-[10px] bg-slate-100 text-slate-600 font-semibold px-2 py-0.5 rounded-md">Channel: {inq.preferredContact === 'phone' ? '📞 Call' : '✉️ Email'}</span>
                              <span className="text-[10px] bg-slate-100 text-slate-600 font-mono px-2 py-0.5 rounded-md">ID: {inq.id}</span>
                              <span className="text-[10px] bg-indigo-50 text-indigo-700 font-bold px-2 py-0.5 rounded-md border border-indigo-100">Engine: Static Memory</span>
                            </div>
                          </div>

                          <div className="flex items-center gap-2">
                            <span className="text-[11px] font-bold px-2.5 py-1 rounded-full bg-amber-50 text-amber-700 border border-amber-100">Pending Advisor Action</span>
                            <button onClick={() => handleDeleteInquiry(inq.id)} className="p-1 rounded-lg text-slate-300 hover:text-red-500 transition-colors cursor-pointer"><Trash2 className="w-4 h-4" /></button>
                          </div>
                        </div>

                        <div className="grid sm:grid-cols-2 gap-4 text-xs">
                          <div className="space-y-1 text-slate-600">
                            <div><strong>Phone:</strong> {inq.phone || 'N/A'}</div>
                            <div><strong>Email:</strong> {inq.email || 'N/A'}</div>
                            <div className="pt-1">
                              <strong>Targets:</strong>
                              <div className="flex flex-wrap gap-1 mt-1">
                                {inq.selectedServiceIds.length > 0 ? (
                                  SERVICES_DATA.filter(s => inq.selectedServiceIds.includes(s.id)).map(s => (
                                    <span key={s.id} className="text-[9px] font-bold bg-emerald-50 text-emerald-800 border border-emerald-100 px-1.5 py-0.5 rounded-sm">{s.name}</span>
                                  ))
                                ) : <span className="text-[9px] bg-slate-55 text-slate-600 border px-1.5 py-0.5 rounded-sm">General Consultation</span>}
                              </div>
                            </div>
                          </div>
                          <div className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1">User Query Notes</span>
                            <p className="text-slate-700 leading-relaxed pr-8 select-text">{inq.message || 'No custom query parameters specified.'}</p>
                          </div>
                        </div>

                        {/* ZERO COST DIRECT TOOLBAR */}
                        <div className="bg-slate-50 rounded-xl p-3.5 border border-slate-200 flex flex-col md:flex-row gap-4 items-center justify-between">
                          <div className="space-y-0.5 text-center md:text-left">
                            <span className="text-[11px] font-extrabold text-slate-700 uppercase tracking-wider flex items-center justify-center md:justify-start gap-1.5">
                              <Sparkles className="w-3.5 h-3.5 text-emerald-600 animate-pulse" />
                              <span>Zero-Cost Direct Actions (100% Free)</span>
                            </span>
                            <p className="text-[10px] text-slate-500 max-w-md">No servers required. Open pre-populated records on WhatsApp, dial callback paths, or generate structured mail drafts instantly.</p>
                          </div>

                          <div className="flex flex-wrap justify-center gap-2 w-full md:w-auto shrink-0">
                            <a href={getWhatsAppUrl(inq)} target="_blank" rel="noreferrer" className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-[11px] py-2 px-3.5 rounded-lg flex items-center justify-center gap-1.5 w-full sm:w-auto shadow-sm shadow-emerald-600/10">
                              <MessageSquare className="w-4 h-4" />
                              <span>Send on WhatsApp</span>
                            </a>
                            {inq.email && (
                              <a href={`mailto:${inq.email}?subject=${encodeURIComponent(inq.aiEmailSubject || '')}&body=${encodeURIComponent(inq.aiEmailBody || '')}`} className="bg-blue-600 hover:bg-blue-700 text-white font-bold text-[11px] py-2 px-3.5 rounded-lg flex items-center justify-center gap-1.5 w-full sm:w-auto shadow-sm">
                                <MailOpen className="w-4 h-4" />
                                <span>Email Structured Reply</span>
                              </a>
                            )}
                            {inq.phone && (
                              <a href={`tel:${inq.phone.replace(/\s+/g, '')}`} className="bg-slate-800 hover:bg-slate-900 text-white font-bold text-[11px] py-2 px-3.5 rounded-lg flex items-center justify-center gap-1.5 w-full sm:w-auto shadow-sm">
                                <PhoneCall className="w-4 h-4" />
                                <span>Dial Hotline</span>
                              </a>
                            )}
                          </div>
                        </div>

                        <div>
                          <button onClick={() => setExpandedInquiryId(isExpanded ? null : inq.id)} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center justify-between cursor-pointer">
                            <span className="flex items-center gap-2">
                              <Terminal className="w-4 h-4 text-emerald-600" />
                              <span>{isExpanded ? 'Hide Local Processing Logs & Draft Files' : 'View Local Processing Logs & Draft Files'}</span>
                            </span>
                            {isExpanded ? <ChevronUp className="w-4 h-4" /> : <ChevronDown className="w-4 h-4" />}
                          </button>
                        </div>

                        {isExpanded && (
                          <div className="space-y-4 animate-fade-in">
                            <div className="space-y-1.5">
                              <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">Local Sequence Logs</span>
                              <div className="bg-slate-950 rounded-xl p-4 font-mono text-[11px] leading-relaxed text-emerald-400 border border-slate-800 max-h-[160px] overflow-y-auto space-y-1">
                                {inq.serverLogs.map((log, index) => (
                                  <div key={index} className="flex gap-2"><span className="text-slate-600">❯</span><span>{log}</span></div>
                                ))}
                              </div>
                            </div>

                            <div className="grid md:grid-cols-2 gap-4">
                              <div className="bg-slate-50 rounded-xl p-4 border border-slate-200 space-y-2 relative">
                                <span className="text-[10px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-100 px-2 py-0.5 rounded-full absolute top-4 right-4 uppercase tracking-wider">Email Draft</span>
                                <h5 className="text-xs font-bold text-slate-700">Client Response Email Template</h5>
                                <div className="space-y-2 pt-1 text-xs">
                                  <div className="bg-white p-2.5 rounded-lg border border-slate-200 font-medium text-slate-800 flex justify-between items-center">
                                    <span className="truncate"><strong>Subject:</strong> {inq.aiEmailSubject}</span>
                                    <button onClick={() => handleCopy(inq.aiEmailSubject, 'sub')} className="text-slate-400 hover:text-emerald-600 transition-colors cursor-pointer">{copiedText['sub'] ? 'Copied' : <Copy className="w-3.5 h-3.5" />}</button>
                                  </div>
                                  <div className="bg-white p-3 rounded-lg border border-slate-200 text-slate-600 whitespace-pre-wrap leading-relaxed max-h-[150px] overflow-y-auto relative">
                                    <button onClick={() => handleCopy(inq.aiEmailBody, 'body')} className="text-slate-400 hover:text-emerald-600 transition-colors absolute top-2 right-2 cursor-pointer">{copiedText['body'] ? 'Copied' : <Copy className="w-3.5 h-3.5" />}</button>
                                    {inq.aiEmailBody}
                                  </div>
                                </div>
                              </div>

                              <div className="bg-slate-50 rounded-xl p-4 border border-slate-200 space-y-2 relative">
                                <span className="text-[10px] font-bold text-blue-600 bg-blue-50 border border-blue-100 px-2 py-0.5 rounded-full absolute top-4 right-4 uppercase tracking-wider">SMS Draft</span>
                                <h5 className="text-xs font-bold text-slate-700">Advisor Direct Dispatch SMS</h5>
                                <div className="space-y-2 pt-1 text-xs">
                                  <div className="bg-white p-3 rounded-lg border border-slate-200 text-slate-600 font-mono text-[10px] leading-relaxed max-h-[120px] overflow-y-auto relative">
                                    <button onClick={() => handleCopy(inq.aiSms, 'sms')} className="text-slate-400 hover:text-emerald-600 transition-colors absolute top-2 right-2 cursor-pointer">{copiedText['sms'] ? 'Copied' : <Copy className="w-3.5 h-3.5" />}</button>
                                    {inq.aiSms}
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </section>
      );
    }

    // --- FOOTER COMPONENT ---
    function Footer() {
      return (
        <footer className="bg-slate-950 text-slate-400 text-sm border-t border-slate-900 pt-16 pb-8 px-4 lg:px-8">
          <div className="max-w-7xl mx-auto space-y-12">
            <div className="grid grid-cols-1 md:grid-cols-12 gap-8 pb-12 border-b border-slate-900">
              <div className="md:col-span-5 space-y-5">
                <div className="flex items-center gap-2.5">
                  <div className="w-9 h-9 rounded-lg bg-emerald-600 flex items-center justify-center text-white"><Briefcase className="w-5 h-5" /></div>
                  <div>
                    <span className="font-serif text-lg font-bold tracking-tight text-white block leading-tight">BIBA</span>
                    <span className="font-sans text-[10px] tracking-widest font-semibold text-emerald-500 block uppercase leading-none mt-0.5">Communication</span>
                  </div>
                </div>
                <p className="text-xs sm:text-sm text-slate-400 leading-relaxed max-w-sm">
                  We specialize in balance sheet finalization, GST filings, trade license coordination, and municipal land tax across Kolkata and West Bengal.
                </p>
                <div className="p-4 bg-slate-900/60 rounded-xl border border-slate-900 text-xs text-slate-400 italic">
                  {"“"}{COMPANY_INFO.slogans[0]}{"”"}
                </div>
              </div>

              <div className="md:col-span-3 space-y-4">
                <h4 className="font-serif font-bold text-white text-xs uppercase tracking-widest">Navigation</h4>
                <ul className="space-y-2.5 text-xs">
                  {['about', 'services', 'estimator', 'faq', 'contact'].map(sec => (
                    <li key={sec}><a href={`#${sec}`} className="hover:text-emerald-400 transition-colors capitalize">{sec === 'estimator' ? 'Quote Planner' : sec.replace('-', ' ')}</a></li>
                  ))}
                </ul>
              </div>

              <div className="md:col-span-4 space-y-4">
                <h4 className="font-serif font-bold text-white text-xs uppercase tracking-widest">Contact Desk</h4>
                <div className="space-y-3 text-xs">
                  <div className="flex items-center gap-2.5">
                    <Phone className="w-4 h-4 text-emerald-500" />
                    <div className="flex flex-col">
                      {COMPANY_INFO.contacts.phones.map((p, i) => <a key={i} href={`tel:${p.replace(/\s+/g, '')}`} className="hover:text-white transition-colors">{p}</a>)}
                    </div>
                  </div>
                  <div className="flex items-center gap-2.5">
                    <Mail className="w-4 h-4 text-emerald-500" />
                    <a href={`mailto:${COMPANY_INFO.contacts.email}`} className="hover:text-white transition-colors">{COMPANY_INFO.contacts.email}</a>
                  </div>
                  <div className="flex items-center gap-2.5">
                    <MapPin className="w-4 h-4 text-emerald-500" />
                    <span>{COMPANY_INFO.contacts.address}</span>
                  </div>
                </div>
              </div>
            </div>

            <div className="flex flex-col sm:flex-row justify-between items-center gap-4 text-xs">
              <p className="text-slate-550">&copy; {new Date().getFullYear()} <strong>Biba Communication</strong>. All rights reserved. Consulting Firm, Kolkata.</p>
              <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="p-2.5 rounded-lg bg-slate-900 border border-slate-800 text-slate-400 hover:text-emerald-400 hover:border-emerald-950 transition-all flex items-center gap-1 cursor-pointer font-bold uppercase tracking-wider text-[10px]">
                <span>Back to Top</span>
                <ArrowUp className="w-3.5 h-3.5" />
              </button>
            </div>
          </div>
        </footer>
      );
    }

    // --- MAIN APP SYSTEM ---
    function App() {
      const [selectedServiceIds, setSelectedServiceIds] = useState([]);

      const handleToggleService = (serviceId) => {
        setSelectedServiceIds(prev =>
          prev.includes(serviceId) ? prev.filter(id => id !== serviceId) : [...prev, serviceId]
        );
      };

      const handleClearServices = () => setSelectedServiceIds([]);

      const handleSelectPredefinedBundle = (serviceIds) => {
        const isAllSelected = serviceIds.every(id => selectedServiceIds.includes(id));
        if (isAllSelected) {
          setSelectedServiceIds(prev => prev.filter(id => !serviceIds.includes(id)));
        } else {
          setSelectedServiceIds(prev => {
            const next = [...prev];
            serviceIds.forEach(id => { if (!next.includes(id)) next.push(id); });
            return next;
          });
        }
      };

      const handleNavigateToPlanner = () => {
        const element = document.getElementById('estimator');
        if (element) {
          const offset = 80;
          const bodyRect = document.body.getBoundingClientRect().top;
          const elementRect = element.getBoundingClientRect().top;
          const offsetPosition = (elementRect - bodyRect) - offset;
          window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
        }
      };

      return (
        <div className="min-h-screen bg-slate-55 font-sans flex flex-col justify-between">
          <div>
            <Header />
            <main>
              <Hero />
              <About />
              <Services selectedServiceIds={selectedServiceIds} onToggleService={handleToggleService} onNavigateToPlanner={handleNavigateToPlanner} />
              <InteractiveEstimator selectedServiceIds={selectedServiceIds} onToggleService={handleToggleService} onClearServices={handleClearServices} onSelectPredefinedBundle={handleSelectPredefinedBundle} />
              <FAQ />
              <ContactForm selectedServiceIds={selectedServiceIds} onToggleService={handleToggleService} />
            </main>
          </div>
          <Footer />
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
